<svg viewBox="0 0 480 300" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dfBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1d36"/>
      <stop offset="1" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="dfArm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#56a0ff"/>
      <stop offset="1" stop-color="#8b7cff"/>
    </linearGradient>
    <radialGradient id="dfGlow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#56a0ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#56a0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="300" fill="url(#dfBg)"/>
  <rect width="480" height="300" fill="url(#dfGlow)"/>
  <!-- grid -->
  <g stroke="#ffffff" stroke-opacity="0.05">
    <path d="M0 60H480M0 120H480M0 180H480M0 240H480"/>
    <path d="M60 0V300M120 0V300M180 0V300M240 0V300M300 0V300M360 0V300M420 0V300"/>
  </g>
  <!-- dashed flight path -->
  <path d="M40 250 C 140 250, 150 90, 240 90 S 360 220, 440 120" stroke="#35e0d0" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="5 7" fill="none"/>
  <circle cx="40" cy="250" r="3.5" fill="#35e0d0"/>
  <circle cx="440" cy="120" r="3.5" fill="#35e0d0"/>
  <!-- quadcopter (top view), centered ~ 240,150 -->
  <g transform="translate(240 150)">
    <!-- arms -->
    <g stroke="url(#dfArm)" stroke-width="7" stroke-linecap="round">
      <line x1="0" y1="0" x2="-62" y2="-44"/>
      <line x1="0" y1="0" x2="62" y2="-44"/>
      <line x1="0" y1="0" x2="-62" y2="44"/>
      <line x1="0" y1="0" x2="62" y2="44"/>
    </g>
    <!-- rotors -->
    <g>
      <circle cx="-62" cy="-44" r="26" fill="none" stroke="#56a0ff" stroke-opacity="0.55" stroke-width="2.5"/>
      <circle cx="62" cy="-44" r="26" fill="none" stroke="#56a0ff" stroke-opacity="0.55" stroke-width="2.5"/>
      <circle cx="-62" cy="44" r="26" fill="none" stroke="#56a0ff" stroke-opacity="0.55" stroke-width="2.5"/>
      <circle cx="62" cy="44" r="26" fill="none" stroke="#56a0ff" stroke-opacity="0.55" stroke-width="2.5"/>
    </g>
    <g fill="#8b7cff">
      <circle cx="-62" cy="-44" r="6"/>
      <circle cx="62" cy="-44" r="6"/>
      <circle cx="-62" cy="44" r="6"/>
      <circle cx="62" cy="44" r="6"/>
    </g>
    <!-- flight controller body -->
    <rect x="-26" y="-20" width="52" height="40" rx="9" fill="#0c1424" stroke="#56a0ff" stroke-width="2"/>
    <rect x="-16" y="-11" width="32" height="22" rx="4" fill="#101a2e" stroke="#35e0d0" stroke-opacity="0.6" stroke-width="1.4"/>
    <circle cx="0" cy="0" r="3.4" fill="#35e0d0"/>
    <!-- heading arrow -->
    <path d="M0 -30 L7 -20 L-7 -20 Z" fill="#35e0d0"/>
  </g>
  <!-- hud text -->
  <g font-family="monospace" fill="#35e0d0" fill-opacity="0.85" font-size="10">
    <text x="20" y="28">STM32H743 · ARDUPILOT</text>
    <text x="20" y="44" fill="#94a1b8">ICM-42688-P · X-FRAME</text>
  </g>
</svg>
