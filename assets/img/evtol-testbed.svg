<svg viewBox="0 0 480 300" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="vgBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101d33"/>
      <stop offset="1" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="vgArm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#56a0ff"/>
      <stop offset="1" stop-color="#8b7cff"/>
    </linearGradient>
    <radialGradient id="vgSafe" cx="0.42" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#35e0d0" stop-opacity="0"/>
      <stop offset="0.8" stop-color="#35e0d0" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#35e0d0" stop-opacity="0.28"/>
    </radialGradient>
  </defs>
  <rect width="480" height="300" fill="url(#vgBg)"/>
  <g stroke="#ffffff" stroke-opacity="0.05">
    <path d="M0 60H480M0 120H480M0 180H480M0 240H480"/>
    <path d="M60 0V300M120 0V300M180 0V300M240 0V300M300 0V300M360 0V300M420 0V300"/>
  </g>

  <!-- obstacle wall on right -->
  <g>
    <rect x="418" y="40" width="30" height="220" rx="4" fill="#1a2740" stroke="#8b7cff" stroke-opacity="0.5"/>
    <g stroke="#8b7cff" stroke-opacity="0.35"><path d="M418 70H448M418 100H448M418 130H448M418 160H448M418 190H448M418 220H448"/></g>
    <text x="433" y="150" fill="#8b7cff" font-family="monospace" font-size="9" text-anchor="middle" transform="rotate(90 433 150)">OBSTACLE</text>
  </g>

  <!-- safety pillow around drone -->
  <ellipse cx="180" cy="160" rx="150" ry="110" fill="url(#vgSafe)"/>
  <ellipse cx="180" cy="160" rx="150" ry="110" fill="none" stroke="#35e0d0" stroke-opacity="0.35" stroke-dasharray="4 6"/>

  <!-- forward depth cone toward wall -->
  <path d="M180 160 L360 96 L360 224 Z" fill="#56a0ff" fill-opacity="0.08" stroke="#56a0ff" stroke-opacity="0.30"/>

  <!-- 360 lidar ring -->
  <circle cx="180" cy="160" r="56" fill="none" stroke="#35e0d0" stroke-opacity="0.4" stroke-width="1.2" stroke-dasharray="2 5"/>

  <!-- quadcopter -->
  <g transform="translate(180 160)">
    <g stroke="url(#vgArm)" stroke-width="7" stroke-linecap="round">
      <line x1="0" y1="0" x2="-40" y2="-30"/>
      <line x1="0" y1="0" x2="40" y2="-30"/>
      <line x1="0" y1="0" x2="-40" y2="30"/>
      <line x1="0" y1="0" x2="40" y2="30"/>
    </g>
    <g fill="none" stroke="#56a0ff" stroke-opacity="0.6" stroke-width="2.2">
      <circle cx="-40" cy="-30" r="17"/><circle cx="40" cy="-30" r="17"/>
      <circle cx="-40" cy="30" r="17"/><circle cx="40" cy="30" r="17"/>
    </g>
    <g fill="#8b7cff"><circle cx="-40" cy="-30" r="5"/><circle cx="40" cy="-30" r="5"/><circle cx="-40" cy="30" r="5"/><circle cx="40" cy="30" r="5"/></g>
    <rect x="-18" y="-13" width="36" height="26" rx="7" fill="#0c1424" stroke="#56a0ff" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#35e0d0"/>
    <!-- velocity vector arrow toward wall -->
    <path d="M22 0 H70" stroke="#35e0d0" stroke-width="2"/>
    <path d="M70 0 L62 -5 L62 5 Z" fill="#35e0d0"/>
  </g>

  <g font-family="monospace" fill="#35e0d0" fill-opacity="0.9" font-size="10">
    <text x="20" y="28">AUTOPILOT + COMPANION COMPUTER</text>
    <text x="20" y="44" fill="#94a1b8">v_max = √(2·a·(d−margin))</text>
  </g>
</svg>
